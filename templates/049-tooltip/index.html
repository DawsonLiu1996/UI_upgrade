<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Tooltip</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen space-x-12">
  <div class="relative flex flex-col items-center group">
    <button class="bg-indigo-600 text-white font-medium px-4 py-2 rounded shadow hover:bg-indigo-700 focus:outline-none">
      悬停于我
    </button>
    <div class="absolute bottom-full mb-2 hidden flex-col items-center group-hover:flex">
      <span class="relative z-10 p-2 text-xs leading-none text-white whitespace-no-wrap bg-gray-900 rounded shadow-lg">这是一个顶部提示框</span>
      <div class="w-3 h-3 -mt-2 rotate-45 bg-gray-900"></div>
    </div>
  </div>

  <div class="relative flex flex-col items-center group">
    <button class="text-gray-500 hover:text-gray-700 focus:outline-none">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
    </button>
    <div class="absolute top-full mt-2 hidden flex-col items-center group-hover:flex z-10">
      <div class="w-3 h-3 -mb-2 rotate-45 bg-gray-800"></div>
      <span class="relative z-10 p-2 text-xs leading-none text-white whitespace-no-wrap bg-gray-800 rounded shadow-lg">点击获取更多信息</span>
    </div>
  </div>
</body>
</html>
