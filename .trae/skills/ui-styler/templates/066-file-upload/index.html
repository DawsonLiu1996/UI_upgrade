<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload Dropzone</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6 font-sans">
    <div class="w-full max-w-lg bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
        <div class="mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Upload Files</h2>
            <p class="text-sm text-gray-500 mt-1">Upload documents or images to your project.</p>
        </div>

        <!-- Dropzone Area -->
        <div class="relative group">
            <div class="absolute inset-0 bg-indigo-50 rounded-xl border-2 border-dashed border-indigo-200 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
            <div class="relative flex flex-col items-center justify-center py-12 px-4 border-2 border-dashed border-gray-300 rounded-xl bg-gray-50 hover:bg-indigo-50/50 hover:border-indigo-400 transition-all duration-300 cursor-pointer">
                
                <div class="w-16 h-16 bg-white rounded-full shadow-sm flex items-center justify-center mb-4 group-hover:scale-110 transition-transform duration-300">
                    <svg class="w-8 h-8 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                </div>
                
                <h3 class="text-lg font-semibold text-gray-700 mb-1">Click to upload or drag and drop</h3>
                <p class="text-xs text-gray-500">SVG, PNG, JPG or PDF (max. 10MB)</p>
                
                <!-- Hidden input -->
                <input type="file" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" multiple>
            </div>
        </div>

        <!-- File List (Mockup) -->
        <div class="mt-8 space-y-3">
            <h4 class="text-sm font-medium text-gray-700 mb-2">Uploading (1)</h4>
            
            <!-- File Item -->
            <div class="flex items-center p-3 bg-gray-50 border border-gray-200 rounded-lg">
                <div class="w-10 h-10 bg-red-100 text-red-500 rounded flex items-center justify-center shrink-0">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"></path></svg>
                </div>
                
                <div class="ml-4 flex-1">
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-sm font-medium text-gray-700 truncate w-48">Q3_Report_Final.pdf</span>
                        <span class="text-xs text-gray-500">45%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-1.5">
                        <div class="bg-indigo-500 h-1.5 rounded-full" style="width: 45%"></div>
                    </div>
                </div>
                
                <button class="ml-4 text-gray-400 hover:text-red-500 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <!-- Completed File Item -->
            <div class="flex items-center p-3 bg-white border border-gray-200 rounded-lg">
                <div class="w-10 h-10 bg-blue-100 text-blue-500 rounded flex items-center justify-center shrink-0">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                
                <div class="ml-4 flex-1">
                    <div class="flex items-center justify-between">
                        <span class="text-sm font-medium text-gray-700 truncate w-48">profile_picture.jpg</span>
                        <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <span class="text-xs text-gray-500">2.4 MB</span>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="mt-8 flex justify-end space-x-3">
            <button class="px-5 py-2.5 border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors">Cancel</button>
            <button class="px-5 py-2.5 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors shadow-sm">Done</button>
        </div>
    </div>
</body>
</html>
