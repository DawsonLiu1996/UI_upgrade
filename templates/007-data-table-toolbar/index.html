<section class="bg-white">
  <div class="mx-auto max-w-6xl px-6 py-12">
    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <h2 class="text-xl font-semibold tracking-tight text-zinc-950">Users</h2>
        <p class="mt-1 text-sm text-zinc-600">A practical table layout with a compact toolbar.</p>
      </div>
      <div class="flex flex-wrap items-center gap-2">
        <div class="relative">
          <input
            class="w-64 max-w-full rounded-xl border border-zinc-200 bg-white px-4 py-2 text-sm text-zinc-900 placeholder:text-zinc-400 focus:border-zinc-400 focus:outline-none focus:ring-4 focus:ring-zinc-100"
            placeholder="Search users…"
            type="search"
          />
        </div>
        <button class="rounded-xl border border-zinc-200 bg-white px-4 py-2 text-sm font-semibold text-zinc-900 hover:bg-zinc-50">
          Filter
        </button>
        <button class="rounded-xl bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm shadow-indigo-600/20 hover:bg-indigo-700">
          Invite
        </button>
      </div>
    </div>

    <div class="mt-6 overflow-hidden rounded-2xl border border-zinc-200">
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-zinc-200 text-left text-sm">
          <thead class="bg-zinc-50">
            <tr>
              <th class="px-5 py-3 font-semibold text-zinc-700">Name</th>
              <th class="px-5 py-3 font-semibold text-zinc-700">Role</th>
              <th class="px-5 py-3 font-semibold text-zinc-700">Status</th>
              <th class="px-5 py-3 font-semibold text-zinc-700">Last active</th>
              <th class="px-5 py-3 text-right font-semibold text-zinc-700">Actions</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-zinc-200 bg-white">
            <tr class="hover:bg-zinc-50">
              <td class="px-5 py-4">
                <div class="flex items-center gap-3">
                  <div class="h-9 w-9 rounded-full bg-zinc-100 ring-1 ring-zinc-200"></div>
                  <div>
                    <div class="font-semibold text-zinc-950">Avery Chen</div>
                    <div class="text-xs text-zinc-500">avery@company.com</div>
                  </div>
                </div>
              </td>
              <td class="px-5 py-4 text-zinc-700">Admin</td>
              <td class="px-5 py-4">
                <span class="inline-flex items-center gap-2 rounded-full bg-emerald-50 px-3 py-1 text-xs font-semibold text-emerald-700 ring-1 ring-emerald-200">
                  <span class="h-1.5 w-1.5 rounded-full bg-emerald-600"></span>
                  Active
                </span>
              </td>
              <td class="px-5 py-4 text-zinc-700">2m ago</td>
              <td class="px-5 py-4 text-right">
                <button class="rounded-lg px-3 py-2 text-sm font-semibold text-zinc-700 hover:bg-white">Edit</button>
              </td>
            </tr>
            <tr class="hover:bg-zinc-50">
              <td class="px-5 py-4">
                <div class="flex items-center gap-3">
                  <div class="h-9 w-9 rounded-full bg-zinc-100 ring-1 ring-zinc-200"></div>
                  <div>
                    <div class="font-semibold text-zinc-950">Noah Patel</div>
                    <div class="text-xs text-zinc-500">noah@company.com</div>
                  </div>
                </div>
              </td>
              <td class="px-5 py-4 text-zinc-700">Member</td>
              <td class="px-5 py-4">
                <span class="inline-flex items-center gap-2 rounded-full bg-amber-50 px-3 py-1 text-xs font-semibold text-amber-700 ring-1 ring-amber-200">
                  <span class="h-1.5 w-1.5 rounded-full bg-amber-600"></span>
                  Invited
                </span>
              </td>
              <td class="px-5 py-4 text-zinc-700">Yesterday</td>
              <td class="px-5 py-4 text-right">
                <button class="rounded-lg px-3 py-2 text-sm font-semibold text-zinc-700 hover:bg-white">Resend</button>
              </td>
            </tr>
            <tr class="hover:bg-zinc-50">
              <td class="px-5 py-4">
                <div class="flex items-center gap-3">
                  <div class="h-9 w-9 rounded-full bg-zinc-100 ring-1 ring-zinc-200"></div>
                  <div>
                    <div class="font-semibold text-zinc-950">Mina Ito</div>
                    <div class="text-xs text-zinc-500">mina@company.com</div>
                  </div>
                </div>
              </td>
              <td class="px-5 py-4 text-zinc-700">Viewer</td>
              <td class="px-5 py-4">
                <span class="inline-flex items-center gap-2 rounded-full bg-zinc-100 px-3 py-1 text-xs font-semibold text-zinc-700 ring-1 ring-zinc-200">
                  <span class="h-1.5 w-1.5 rounded-full bg-zinc-500"></span>
                  Suspended
                </span>
              </td>
              <td class="px-5 py-4 text-zinc-700">10d ago</td>
              <td class="px-5 py-4 text-right">
                <button class="rounded-lg px-3 py-2 text-sm font-semibold text-zinc-700 hover:bg-white">Review</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</section>
