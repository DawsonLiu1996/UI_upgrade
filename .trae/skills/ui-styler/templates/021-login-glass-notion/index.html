<section class="relative overflow-hidden bg-white">
  <div class="pointer-events-none absolute inset-0">

            />
          </label>
          <label class="block">
            <span class="text-xs font-semibold text-zinc-700">Password</span>

            <button type="button" class="rounded-2xl border border-zinc-200 bg-white px-4 py-3 text-sm font-semibold text-zinc-900 hover:bg-zinc-50">
              Google
