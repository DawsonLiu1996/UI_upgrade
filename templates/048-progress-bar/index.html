<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Progress Bar</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen p-6">
  <div class="w-full max-w-md bg-white p-6 rounded-xl shadow-md space-y-6">
    <div>
      <div class="flex justify-between mb-1">
        <span class="text-sm font-medium text-blue-700">系统更新</span>
        <span class="text-sm font-medium text-blue-700">45%</span>
      </div>
      <div class="w-full bg-gray-200 rounded-full h-2.5">
        <div class="bg-blue-600 h-2.5 rounded-full" style="width: 45%"></div>
      </div>
    </div>
    
    <div>
      <div class="flex justify-between mb-1">
        <span class="text-sm font-medium text-green-700">数据同步</span>
        <span class="text-sm font-medium text-green-700">100%</span>
      </div>
      <div class="w-full bg-gray-200 rounded-full h-4">
        <div class="bg-green-500 h-4 rounded-full flex items-center justify-center text-xs text-white" style="width: 100%">完成</div>
      </div>
    </div>
    
    <div>
      <div class="flex justify-between mb-1">
        <span class="text-sm font-medium text-red-700">存储空间使用</span>
        <span class="text-sm font-medium text-red-700">90%</span>
      </div>
      <div class="w-full bg-gray-200 rounded-full h-1.5">
        <div class="bg-red-600 h-1.5 rounded-full" style="width: 90%"></div>
      </div>
    </div>
  </div>
</body>
</html>
