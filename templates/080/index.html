<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4">
    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <!-- Header -->
        <div class="bg-indigo-600 px-8 py-10 text-white relative overflow-hidden">
            <div class="relative z-10">
                <h1 class="text-3xl font-bold mb-2">Senior Frontend Developer</h1>
                <p class="text-indigo-100 flex items-center gap-4 text-sm">
                    <span><i class="fas fa-map-marker-alt mr-1"></i> Remote / New York</span>
                    <span><i class="fas fa-clock mr-1"></i> Full-time</span>
                    <span><i class="fas fa-building mr-1"></i> TechCorp Inc.</span>
                </p>
            </div>
            <!-- Decorative circle -->
            <div class="absolute -top-24 -right-24 w-64 h-64 bg-white opacity-10 rounded-full"></div>
            <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-white opacity-10 rounded-full"></div>
        </div>

        <!-- Form -->
        <form class="p-8">
            <!-- Section 1: Personal Info -->
            <div class="mb-10">
                <h2 class="text-lg font-semibold text-slate-800 border-b border-slate-200 pb-2 mb-6">Personal Information</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">First Name <span class="text-red-500">*</span></label>
                        <input type="text" class="w-full px-4 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-colors" placeholder="Jane">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Last Name <span class="text-red-500">*</span></label>
                        <input type="text" class="w-full px-4 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-colors" placeholder="Doe">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Email Address <span class="text-red-500">*</span></label>
                        <input type="email" class="w-full px-4 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-colors" placeholder="jane.doe@example.com">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Phone Number</label>
                        <input type="tel" class="w-full px-4 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-colors" placeholder="+1 (555) 000-0000">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Location</label>
                        <input type="text" class="w-full px-4 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-colors" placeholder="City, Country">
                    </div>
                </div>
            </div>

            <!-- Section 2: Professional Details -->
            <div class="mb-10">
                <h2 class="text-lg font-semibold text-slate-800 border-b border-slate-200 pb-2 mb-6">Professional Details</h2>
                <div class="space-y-6">
                    <!-- Resume Upload -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Resume / CV <span class="text-red-500">*</span></label>
                        <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-slate-300 border-dashed rounded-md hover:border-indigo-400 hover:bg-indigo-50 transition-colors cursor-pointer group">
                            <div class="space-y-1 text-center">
                                <i class="fas fa-cloud-upload-alt text-3xl text-slate-400 group-hover:text-indigo-500 mb-2"></i>
                                <div class="flex text-sm text-slate-600 justify-center">
                                    <span class="relative font-medium text-indigo-600 hover:text-indigo-500">
                                        Upload a file
                                    </span>
                                    <p class="pl-1">or drag and drop</p>
                                </div>
                                <p class="text-xs text-slate-500">PDF, DOC, DOCX up to 10MB</p>
                            </div>
                        </div>
                    </div>

                    <!-- Links -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">LinkedIn Profile</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fab fa-linkedin text-slate-400"></i>
                                </div>
                                <input type="url" class="w-full pl-10 px-4 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-colors" placeholder="linkedin.com/in/username">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Portfolio / GitHub</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fas fa-link text-slate-400"></i>
                                </div>
                                <input type="url" class="w-full pl-10 px-4 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-colors" placeholder="github.com/username">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Section 3: Additional Info -->
            <div class="mb-10">
                <h2 class="text-lg font-semibold text-slate-800 border-b border-slate-200 pb-2 mb-6">Additional Information</h2>
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Cover Letter</label>
                        <textarea rows="4" class="w-full px-4 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-colors resize-y" placeholder="Tell us why you're a great fit for this role..."></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">How did you hear about us?</label>
                        <div class="flex flex-wrap gap-4">
                            <label class="inline-flex items-center">
                                <input type="radio" name="source" class="text-indigo-600 focus:ring-indigo-500 border-slate-300">
                                <span class="ml-2 text-sm text-slate-700">LinkedIn</span>
                            </label>
                            <label class="inline-flex items-center">
                                <input type="radio" name="source" class="text-indigo-600 focus:ring-indigo-500 border-slate-300">
                                <span class="ml-2 text-sm text-slate-700">Company Website</span>
                            </label>
                            <label class="inline-flex items-center">
                                <input type="radio" name="source" class="text-indigo-600 focus:ring-indigo-500 border-slate-300">
                                <span class="ml-2 text-sm text-slate-700">Job Board</span>
                            </label>
                            <label class="inline-flex items-center">
                                <input type="radio" name="source" class="text-indigo-600 focus:ring-indigo-500 border-slate-300">
                                <span class="ml-2 text-sm text-slate-700">Referral</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Submit -->
            <div class="pt-4 border-t border-slate-200 flex justify-end">
                <button type="button" class="px-6 py-2 border border-slate-300 rounded-md text-slate-700 font-medium hover:bg-slate-50 mr-4 transition-colors">Cancel</button>
                <button type="submit" class="px-6 py-2 bg-indigo-600 rounded-md text-white font-medium hover:bg-indigo-700 shadow-sm transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">Submit Application</button>
            </div>
        </form>
    </div>
</body>
</html>
