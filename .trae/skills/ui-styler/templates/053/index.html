<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-blue-50/30 p-4 md:p-8 min-h-screen text-slate-800 font-sans">
    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        
        <!-- Calendar Header -->
        <header class="flex items-center justify-between border-b border-slate-200 px-6 py-4 lg:flex-none">
            <h1 class="text-2xl font-bold leading-6 text-slate-900">
                <time datetime="2023-10">October 2023</time>
            </h1>
            <div class="flex items-center">
                <div class="relative flex items-center rounded-md bg-white shadow-sm md:items-stretch">
                    <button type="button" class="flex h-9 w-12 items-center justify-center rounded-l-md border-y border-l border-slate-300 pr-1 text-slate-400 hover:text-slate-500 hover:bg-slate-50 focus:relative focus:z-10 focus:ring-2 focus:ring-blue-600 transition-colors">
                        <span class="sr-only">Previous month</span>
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
                    <button type="button" class="hidden border-y border-slate-300 px-3.5 text-sm font-semibold text-slate-900 hover:bg-slate-50 focus:relative focus:z-10 focus:ring-2 focus:ring-blue-600 md:block transition-colors">
                        Today
                    </button>
                    <span class="relative -mx-px h-5 w-px bg-slate-300 md:hidden"></span>
                    <button type="button" class="flex h-9 w-12 items-center justify-center rounded-r-md border-y border-r border-slate-300 pl-1 text-slate-400 hover:text-slate-500 hover:bg-slate-50 focus:relative focus:z-10 focus:ring-2 focus:ring-blue-600 transition-colors">
                        <span class="sr-only">Next month</span>
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>
                <div class="hidden md:ml-4 md:flex md:items-center">
                    <div class="relative">
                        <button type="button" class="flex items-center gap-x-1.5 rounded-md bg-white px-3 py-2 text-sm font-semibold text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 hover:bg-slate-50 focus:relative focus:ring-2 focus:ring-blue-600 transition-colors" id="menu-button" aria-expanded="false" aria-haspopup="true">
                            Month view
                            <i class="fa-solid fa-chevron-down text-slate-400 text-xs ml-1"></i>
                        </button>
                    </div>
                    <div class="ml-6 h-6 w-px bg-slate-300"></div>
                    <button type="button" class="ml-6 rounded-md bg-blue-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-blue-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600 transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-plus"></i> Add event
                    </button>
                </div>
            </div>
        </header>

        <!-- Calendar Grid -->
        <div class="shadow ring-1 ring-slate-200 ring-opacity-5 lg:flex lg:flex-auto lg:flex-col">
            <!-- Days of week -->
            <div class="grid grid-cols-7 gap-px border-b border-slate-300 bg-slate-200 text-center text-xs font-semibold leading-6 text-slate-700 lg:flex-none">
                <div class="bg-slate-50 py-2">M<span class="sr-only sm:not-sr-only">on</span></div>
                <div class="bg-slate-50 py-2">T<span class="sr-only sm:not-sr-only">ue</span></div>
                <div class="bg-slate-50 py-2">W<span class="sr-only sm:not-sr-only">ed</span></div>
                <div class="bg-slate-50 py-2">T<span class="sr-only sm:not-sr-only">hu</span></div>
                <div class="bg-slate-50 py-2">F<span class="sr-only sm:not-sr-only">ri</span></div>
                <div class="bg-slate-50 py-2">S<span class="sr-only sm:not-sr-only">at</span></div>
                <div class="bg-slate-50 py-2">S<span class="sr-only sm:not-sr-only">un</span></div>
            </div>
            
            <div class="flex bg-slate-200 text-xs leading-6 text-slate-700 lg:flex-auto">
                <div class="hidden w-full lg:grid lg:grid-cols-7 lg:grid-rows-5 lg:gap-px">
                    
                    <!-- Row 1 -->
                    <!-- Prev Month Day -->
                    <div class="min-h-[120px] bg-slate-50 px-3 py-2 text-slate-400 transition hover:bg-slate-100">
                        <time datetime="2023-09-25">25</time>
                    </div>
                    <div class="min-h-[120px] bg-slate-50 px-3 py-2 text-slate-400 transition hover:bg-slate-100">
                        <time datetime="2023-09-26">26</time>
                    </div>
                    <div class="min-h-[120px] bg-slate-50 px-3 py-2 text-slate-400 transition hover:bg-slate-100">
                        <time datetime="2023-09-27">27</time>
                    </div>
                    <div class="min-h-[120px] bg-slate-50 px-3 py-2 text-slate-400 transition hover:bg-slate-100">
                        <time datetime="2023-09-28">28</time>
                    </div>
                    <div class="min-h-[120px] bg-slate-50 px-3 py-2 text-slate-400 transition hover:bg-slate-100">
                        <time datetime="2023-09-29">29</time>
                    </div>
                    <div class="min-h-[120px] bg-slate-50 px-3 py-2 text-slate-400 transition hover:bg-slate-100">
                        <time datetime="2023-09-30">30</time>
                    </div>
                    <!-- Current Month Day 1 -->
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50 relative group">
                        <time datetime="2023-10-01" class="font-medium text-slate-900">1</time>
                        <button class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 text-blue-600 hover:bg-blue-50 rounded p-1 transition-all"><i class="fa-solid fa-plus text-[10px]"></i></button>
                    </div>

                    <!-- Row 2 -->
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50 relative group">
                        <time datetime="2023-10-02" class="font-medium text-slate-900">2</time>
                        <ol class="mt-2 space-y-1">
                            <li>
                                <a href="#" class="group flex items-center rounded-md px-1.5 py-0.5 text-xs font-medium leading-5 bg-blue-50 text-blue-700 hover:bg-blue-100 truncate border border-blue-100">
                                    <span class="w-1.5 h-1.5 rounded-full bg-blue-500 mr-1.5 flex-shrink-0"></span>
                                    <p class="truncate">Team Sync</p>
                                    <time datetime="2023-10-02T10:00" class="ml-auto text-[10px] text-blue-500 font-normal">10AM</time>
                                </a>
                            </li>
                        </ol>
                    </div>
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50 relative group">
                        <time datetime="2023-10-03" class="font-medium text-slate-900">3</time>
                    </div>
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50 relative group">
                        <time datetime="2023-10-04" class="font-medium text-slate-900">4</time>
                        <ol class="mt-2 space-y-1">
                            <li>
                                <a href="#" class="group flex items-center rounded-md px-1.5 py-0.5 text-xs font-medium leading-5 bg-pink-50 text-pink-700 hover:bg-pink-100 truncate border border-pink-100">
                                    <span class="w-1.5 h-1.5 rounded-full bg-pink-500 mr-1.5 flex-shrink-0"></span>
                                    <p class="truncate">Product Launch</p>
                                </a>
                            </li>
                            <li>
                                <a href="#" class="group flex items-center rounded-md px-1.5 py-0.5 text-xs font-medium leading-5 bg-slate-50 text-slate-700 hover:bg-slate-100 truncate border border-slate-200">
                                    <p class="truncate">Dentist</p>
                                    <time datetime="2023-10-04T14:00" class="ml-auto text-[10px] text-slate-500 font-normal">2PM</time>
                                </a>
                            </li>
                        </ol>
                    </div>
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50 relative group">
                        <time datetime="2023-10-05" class="font-medium text-slate-900">5</time>
                    </div>
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50 relative group">
                        <time datetime="2023-10-06" class="font-medium text-slate-900">6</time>
                    </div>
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50 relative group">
                        <time datetime="2023-10-07" class="font-medium text-slate-900">7</time>
                    </div>
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50 relative group">
                        <time datetime="2023-10-08" class="font-medium text-slate-900">8</time>
                    </div>

                    <!-- Row 3 -->
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50 relative group">
                        <time datetime="2023-10-09" class="font-medium text-slate-900">9</time>
                    </div>
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50 relative group ring-2 ring-inset ring-blue-600 bg-blue-50/10">
                        <div class="flex items-center">
                            <time datetime="2023-10-10" class="flex h-6 w-6 items-center justify-center rounded-full bg-blue-600 font-semibold text-white">10</time>
                        </div>
                        <ol class="mt-2 space-y-1">
                            <li>
                                <a href="#" class="group flex items-center rounded-md px-1.5 py-0.5 text-xs font-medium leading-5 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 truncate border border-emerald-100">
                                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 mr-1.5 flex-shrink-0"></span>
                                    <p class="truncate">Q3 Review</p>
                                    <time datetime="2023-10-10T13:00" class="ml-auto text-[10px] text-emerald-500 font-normal">1PM</time>
                                </a>
                            </li>
                        </ol>
                    </div>
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50 relative group">
                        <time datetime="2023-10-11" class="font-medium text-slate-900">11</time>
                    </div>
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50 relative group">
                        <time datetime="2023-10-12" class="font-medium text-slate-900">12</time>
                    </div>
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50 relative group">
                        <time datetime="2023-10-13" class="font-medium text-slate-900">13</time>
                        <ol class="mt-2 space-y-1">
                            <li>
                                <div class="bg-amber-100 text-amber-800 text-xs font-medium px-2 py-0.5 rounded border border-amber-200 truncate shadow-sm">
                                    Offsite Meeting (Day 1)
                                </div>
                            </li>
                        </ol>
                    </div>
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50 relative group">
                        <time datetime="2023-10-14" class="font-medium text-slate-900">14</time>
                        <ol class="mt-2 space-y-1">
                            <li>
                                <div class="bg-amber-100 text-amber-800 text-xs font-medium px-2 py-0.5 rounded border border-amber-200 truncate shadow-sm">
                                    Offsite Meeting (Day 2)
                                </div>
                            </li>
                        </ol>
                    </div>
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50 relative group">
                        <time datetime="2023-10-15" class="font-medium text-slate-900">15</time>
                    </div>

                    <!-- Row 4 -->
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50">
                        <time datetime="2023-10-16" class="font-medium text-slate-900">16</time>
                    </div>
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50">
                        <time datetime="2023-10-17" class="font-medium text-slate-900">17</time>
                    </div>
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50">
                        <time datetime="2023-10-18" class="font-medium text-slate-900">18</time>
                    </div>
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50">
                        <time datetime="2023-10-19" class="font-medium text-slate-900">19</time>
                    </div>
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50">
                        <time datetime="2023-10-20" class="font-medium text-slate-900">20</time>
                    </div>
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50">
                        <time datetime="2023-10-21" class="font-medium text-slate-900">21</time>
                    </div>
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50">
                        <time datetime="2023-10-22" class="font-medium text-slate-900">22</time>
                    </div>
                    
                    <!-- Row 5 (Simplified for brevity) -->
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50">
                        <time datetime="2023-10-23" class="font-medium text-slate-900">23</time>
                    </div>
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50">
                        <time datetime="2023-10-24" class="font-medium text-slate-900">24</time>
                    </div>
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50">
                        <time datetime="2023-10-25" class="font-medium text-slate-900">25</time>
                    </div>
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50">
                        <time datetime="2023-10-26" class="font-medium text-slate-900">26</time>
                    </div>
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50">
                        <time datetime="2023-10-27" class="font-medium text-slate-900">27</time>
                    </div>
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50">
                        <time datetime="2023-10-28" class="font-medium text-slate-900">28</time>
                    </div>
                    <div class="min-h-[120px] bg-white px-3 py-2 transition hover:bg-slate-50">
                        <time datetime="2023-10-29" class="font-medium text-slate-900">29</time>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
