<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Styler - Template Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style type="text/tailwindcss">
    html, body {
      height: 100%;
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #viewer-header {
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }
    #viewer-header a {
      color: #475569;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #viewer-header a:hover {
      color: #0f172a;
    }
    #template-container {
      flex: 1;
      width: 100%;
      position: relative;
    }
  </style>
</head>
<body>
  <div id="viewer-header">
    <a href="preview.html">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      Back to Gallery
    </a>
    <div id="template-title" style="font-weight: 500; color: #334155;">Loading...</div>
    <div></div>
  </div>

  <div id="template-container"></div>

  <script src="./template-data.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');

    if (id) {
      document.getElementById('template-title').textContent = id;
      
      // Get the template HTML from the pre-bundled data object instead of fetching
      const html = window.UI_STYLER_TEMPLATES && window.UI_STYLER_TEMPLATES[id];
      
      if (!html) {
        document.getElementById('template-container').innerHTML = `
          <div style="padding: 40px; text-align: center; color: #ef4444;">
            Failed to load template: Template not found in data bundle.
          </div>
        `;
      } else {
        // Use an iframe to isolate styles and run Tailwind CDN properly
          const iframe = document.createElement('iframe');
          iframe.style.width = '100%';
          iframe.style.height = '100%';
          iframe.style.border = 'none';
          
          // Append the iframe first so it has a document object
          document.getElementById('template-container').innerHTML = '';
          document.getElementById('template-container').appendChild(iframe);
          
          // Use postMessage to safely send the HTML content to the iframe
          // This avoids any syntax errors from unescaped characters in template literals
          // and completely bypasses any file:// CORS issues since we don't access contentWindow directly
          const iframeContent = `
            <!DOCTYPE html>
            <html class="h-full">
            <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <script src="https://cdn.tailwindcss.com"><\/script>
              <script>
                // Suppress Tailwind CDN warning in console
                const originalWarn = console.warn;
                console.warn = function() {
                  if (arguments[0] && typeof arguments[0] === 'string' && arguments[0].includes('cdn.tailwindcss.com should not be used in production')) return;
                  originalWarn.apply(console, arguments);
                };
                
                // Listen for the HTML content from the parent window
                window.addEventListener('message', function(event) {
                  if (event.data && event.data.type === 'render-html') {
                    document.body.innerHTML = event.data.html;
                  }
                });
              <\/script>
              <style type="text/tailwindcss">
                html, body { height: 100%; margin: 0; }
              </style>
            </head>
            <body class="h-full font-sans antialiased text-slate-900 bg-white">
              <!-- Content will be injected here via postMessage -->
            </body>
            </html>
          `;
          
          const blob = new Blob([iframeContent], { type: 'text/html;charset=utf-8' });
          const blobUrl = URL.createObjectURL(blob);
          
          iframe.onload = () => {
          // Once the iframe is loaded, safely send the fetched HTML content
          iframe.contentWindow.postMessage({
            type: 'render-html',
            html: html
          }, '*');
          URL.revokeObjectURL(blobUrl);
        };
        
        iframe.src = blobUrl;
      }
    } else {
      document.getElementById('template-container').innerHTML = `
        <div style="padding: 40px; text-align: center; color: #64748b;">
          No template ID specified. <a href="preview.html" style="color: #3b82f6;">Go back to gallery</a>.
        </div>
      `;
      document.getElementById('template-title').textContent = 'Error';
    }
  </script>
</body>
</html>
