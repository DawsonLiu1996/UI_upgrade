<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Stepper</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6 font-sans">
    
    <div class="max-w-3xl w-full bg-white rounded-2xl shadow-sm border border-slate-200 p-10">
        <h2 class="text-2xl font-bold text-slate-800 mb-2">Checkout Process</h2>
        <p class="text-slate-500 text-sm mb-12">Please complete the steps below to finalize your order.</p>

        <!-- Stepper -->
        <nav aria-label="Progress">
            <ol role="list" class="flex items-center">
                
                <!-- Step 1: Completed -->
                <li class="relative pr-8 sm:pr-20">
                    <div class="absolute inset-0 flex items-center" aria-hidden="true">
                        <div class="h-1 w-full bg-indigo-600 rounded-full"></div>
                    </div>
                    <a href="#" class="relative flex h-10 w-10 items-center justify-center rounded-full bg-indigo-600 hover:bg-indigo-700 transition-colors shadow-md ring-4 ring-white">
                        <svg class="h-6 w-6 text-white" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                            <path fill-rule="evenodd" d="M19.916 4.626a.75.75 0 01.208 1.04l-9 13.5a.75.75 0 01-1.154.114l-6-6a.75.75 0 011.06-1.06l5.353 5.353 8.493-12.739a.75.75 0 011.04-.208z" clip-rule="evenodd" />
                        </svg>
                        <span class="sr-only">Step 1: Account Info</span>
                    </a>
                    <div class="absolute top-12 left-1/2 -translate-x-1/2 mt-2 w-max text-center">
                        <span class="text-sm font-semibold text-indigo-600">Account</span>
                    </div>
                </li>

                <!-- Step 2: Completed -->
                <li class="relative pr-8 sm:pr-20">
                    <div class="absolute inset-0 flex items-center" aria-hidden="true">
                        <div class="h-1 w-full bg-indigo-600 rounded-full"></div>
                    </div>
                    <a href="#" class="relative flex h-10 w-10 items-center justify-center rounded-full bg-indigo-600 hover:bg-indigo-700 transition-colors shadow-md ring-4 ring-white">
                        <svg class="h-6 w-6 text-white" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                            <path fill-rule="evenodd" d="M19.916 4.626a.75.75 0 01.208 1.04l-9 13.5a.75.75 0 01-1.154.114l-6-6a.75.75 0 011.06-1.06l5.353 5.353 8.493-12.739a.75.75 0 011.04-.208z" clip-rule="evenodd" />
                        </svg>
                        <span class="sr-only">Step 2: Shipping</span>
                    </a>
                    <div class="absolute top-12 left-1/2 -translate-x-1/2 mt-2 w-max text-center">
                        <span class="text-sm font-semibold text-indigo-600">Shipping</span>
                    </div>
                </li>

                <!-- Step 3: Current -->
                <li class="relative pr-8 sm:pr-20">
                    <div class="absolute inset-0 flex items-center" aria-hidden="true">
                        <div class="h-1 w-full bg-slate-200 rounded-full"></div>
                    </div>
                    <a href="#" class="relative flex h-10 w-10 items-center justify-center rounded-full border-2 border-indigo-600 bg-white ring-4 ring-white" aria-current="step">
                        <span class="h-3 w-3 rounded-full bg-indigo-600" aria-hidden="true"></span>
                        <span class="sr-only">Step 3: Payment</span>
                    </a>
                    <div class="absolute top-12 left-1/2 -translate-x-1/2 mt-2 w-max text-center">
                        <span class="text-sm font-bold text-slate-900">Payment</span>
                    </div>
                </li>

                <!-- Step 4: Upcoming -->
                <li class="relative">
                    <a href="#" class="relative flex h-10 w-10 items-center justify-center rounded-full border-2 border-slate-300 bg-white hover:border-slate-400 transition-colors ring-4 ring-white">
                        <span class="text-slate-500 font-medium text-sm">4</span>
                        <span class="sr-only">Step 4: Review</span>
                    </a>
                    <div class="absolute top-12 left-1/2 -translate-x-1/2 mt-2 w-max text-center">
                        <span class="text-sm font-medium text-slate-500">Review</span>
                    </div>
                </li>
            </ol>
        </nav>

        <!-- Current Step Content Placeholder -->
        <div class="mt-20 border-2 border-dashed border-slate-200 rounded-xl p-12 text-center bg-slate-50/50">
            <h3 class="text-lg font-medium text-slate-800 mb-2">Payment Details</h3>
            <p class="text-slate-500 text-sm">Please enter your credit card information securely.</p>
            
            <div class="mt-8 flex justify-between max-w-sm mx-auto">
                <button class="px-5 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 transition-colors">Back</button>
                <button class="px-5 py-2 text-sm font-medium text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 shadow-sm transition-colors">Continue to Review</button>
            </div>
        </div>

    </div>

</body>
</html>
