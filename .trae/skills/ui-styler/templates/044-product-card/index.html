<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Product Card</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen p-6">
  <div class="group relative flex flex-col w-full max-w-xs overflow-hidden rounded-lg border border-gray-200 bg-white shadow-md hover:shadow-xl transition-shadow duration-300">
    <div class="relative flex h-60 overflow-hidden bg-gray-200">
      <img class="object-cover w-full h-full transition-transform duration-500 group-hover:scale-110" src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" alt="product image" />
      <span class="absolute top-2 left-2 rounded-full bg-red-500 px-2 py-1 text-xs font-semibold text-white">促销</span>
    </div>
    <div class="mt-4 px-5 pb-5 flex-1 flex flex-col">
      <a href="#">
        <h5 class="text-xl font-bold tracking-tight text-gray-900 line-clamp-2">Apple Watch Series 7 GPS, Aluminium Case</h5>
      </a>
      <div class="mt-2 mb-5 flex items-center justify-between">
        <p>
          <span class="text-2xl font-bold text-gray-900">￥2999</span>
          <span class="text-sm text-gray-500 line-through">￥3199</span>
        </p>
      </div>
      <div class="mt-auto">
        <a href="#" class="flex items-center justify-center rounded-md bg-blue-600 px-5 py-2.5 text-center text-sm font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-300 transition-colors">
          <svg class="mr-2 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a28 2a2 2 0 11-4 0 2 2 0 014 0z" />
          </svg>
          加入购物车
        </a>
      </div>
    </div>
  </div>
</body>
</html>
