<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-step Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-xl w-full bg-white rounded-2xl shadow-lg p-8">
        <div class="mb-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Account Setup</h2>
            <p class="text-gray-500 text-sm">Please fill in your details to create an account.</p>
        </div>

        <!-- Progress Bar -->
        <div class="mb-8 relative">
            <div class="overflow-hidden h-2 mb-4 text-xs flex rounded bg-gray-200">
                <div style="width: 50%" class="shadow-none flex flex-col text-center whitespace-nowrap text-white justify-center bg-indigo-600 transition-all duration-500"></div>
            </div>
            <div class="flex justify-between text-xs font-medium text-gray-500">
                <span class="text-indigo-600">Personal Info</span>
                <span class="text-indigo-600">Preferences</span>
                <span>Security</span>
            </div>
        </div>

        <!-- Form Content -->
        <form>
            <div class="space-y-6">
                <!-- Step 2 Content (Active) -->
                <div>
                    <h3 class="text-lg font-semibold text-gray-800 mb-4">What are you interested in?</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="relative flex items-center p-4 border-2 border-indigo-600 rounded-xl cursor-pointer bg-indigo-50">
                            <input type="radio" name="interest" class="absolute h-0 w-0 opacity-0" checked>
                            <i class="fas fa-laptop-code text-indigo-600 text-xl mr-3"></i>
                            <span class="font-medium text-indigo-900">Development</span>
                            <div class="absolute top-2 right-2 h-4 w-4 bg-indigo-600 rounded-full flex items-center justify-center">
                                <i class="fas fa-check text-white text-[10px]"></i>
                            </div>
                        </label>
                        <label class="relative flex items-center p-4 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-indigo-300 hover:bg-indigo-50/50 transition-colors">
                            <input type="radio" name="interest" class="absolute h-0 w-0 opacity-0">
                            <i class="fas fa-paint-brush text-gray-400 text-xl mr-3"></i>
                            <span class="font-medium text-gray-600">Design</span>
                        </label>
                        <label class="relative flex items-center p-4 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-indigo-300 hover:bg-indigo-50/50 transition-colors">
                            <input type="radio" name="interest" class="absolute h-0 w-0 opacity-0">
                            <i class="fas fa-bullhorn text-gray-400 text-xl mr-3"></i>
                            <span class="font-medium text-gray-600">Marketing</span>
                        </label>
                        <label class="relative flex items-center p-4 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-indigo-300 hover:bg-indigo-50/50 transition-colors">
                            <input type="radio" name="interest" class="absolute h-0 w-0 opacity-0">
                            <i class="fas fa-chart-line text-gray-400 text-xl mr-3"></i>
                            <span class="font-medium text-gray-600">Business</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Experience Level</label>
                    <select class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition-shadow text-gray-700">
                        <option>Beginner</option>
                        <option selected>Intermediate</option>
                        <option>Advanced</option>
                        <option>Expert</option>
                    </select>
                </div>
            </div>

            <!-- Navigation Buttons -->
            <div class="mt-10 flex justify-between items-center">
                <button type="button" class="px-6 py-2.5 border border-gray-300 text-gray-700 font-medium rounded-lg hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
                    <i class="fas fa-arrow-left mr-2 text-sm"></i> Back
                </button>
                <button type="button" class="px-6 py-2.5 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors shadow-md">
                    Continue <i class="fas fa-arrow-right ml-2 text-sm"></i>
                </button>
            </div>
        </form>
    </div>
</body>
</html>
