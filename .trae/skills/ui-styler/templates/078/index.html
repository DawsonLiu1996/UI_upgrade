<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player Shell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-4xl w-full">
        <!-- Video Container -->
        <div class="relative bg-black rounded-xl overflow-hidden shadow-2xl aspect-video group">
            
            <!-- Placeholder Video Area -->
            <div class="absolute inset-0 flex items-center justify-center bg-slate-800">
                <i class="fas fa-play-circle text-6xl text-slate-600 opacity-50"></i>
                <!-- Simulated video content image -->
                <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?ixlib=rb-1.2.1&auto=format&fit=crop&w=1600&q=80" alt="Video thumbnail" class="absolute inset-0 w-full h-full object-cover opacity-60">
            </div>

            <!-- Top Controls (Overlay) -->
            <div class="absolute top-0 left-0 right-0 p-4 bg-gradient-to-b from-black/70 to-transparent flex justify-between items-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                <h2 class="text-white font-medium truncate">Building the Future of Web Development.mp4</h2>
                <div class="flex gap-3 text-white">
                    <button class="hover:text-blue-400 transition-colors"><i class="fas fa-share-alt"></i></button>
                    <button class="hover:text-blue-400 transition-colors"><i class="fas fa-ellipsis-v"></i></button>
                </div>
            </div>

            <!-- Big Play Button (Center) -->
            <button class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-16 h-16 bg-blue-600/80 hover:bg-blue-600 text-white rounded-full flex items-center justify-center transition-all shadow-lg hover:scale-110 opacity-0 group-hover:opacity-100">
                <i class="fas fa-play text-xl ml-1"></i>
            </button>

            <!-- Bottom Controls -->
            <div class="absolute bottom-0 left-0 right-0 px-4 pb-4 pt-12 bg-gradient-to-t from-black/90 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                
                <!-- Progress Bar -->
                <div class="w-full h-1 bg-gray-600 rounded-full mb-4 cursor-pointer relative group/progress">
                    <div class="absolute top-1/2 -translate-y-1/2 h-2 w-full bg-gray-500/30 rounded-full opacity-0 group-hover/progress:opacity-100 transition-opacity"></div>
                    <div class="h-full bg-blue-500 rounded-full relative" style="width: 45%;">
                        <div class="absolute right-0 top-1/2 transform translate-x-1/2 -translate-y-1/2 w-3 h-3 bg-white rounded-full shadow scale-0 group-hover/progress:scale-100 transition-transform"></div>
                    </div>
                </div>

                <div class="flex justify-between items-center text-white">
                    <div class="flex items-center gap-4">
                        <button class="hover:text-blue-400 transition-colors"><i class="fas fa-play"></i></button>
                        <button class="hover:text-blue-400 transition-colors"><i class="fas fa-step-forward"></i></button>
                        
                        <div class="flex items-center gap-2 group/volume relative">
                            <button class="hover:text-blue-400 transition-colors"><i class="fas fa-volume-up"></i></button>
                            <div class="w-0 overflow-hidden group-hover/volume:w-20 transition-all duration-300 ease-out flex items-center">
                                <div class="w-16 h-1 bg-gray-600 rounded-full cursor-pointer ml-2">
                                    <div class="h-full bg-blue-500 rounded-full" style="width: 70%;"></div>
                                </div>
                            </div>
                        </div>
                        
                        <span class="text-xs font-medium text-gray-300 ml-2">12:34 / 28:05</span>
                    </div>

                    <div class="flex items-center gap-4">
                        <button class="text-xs font-bold border border-white/40 px-1 rounded hover:bg-white/20 transition-colors">CC</button>
                        <button class="hover:text-blue-400 transition-colors"><i class="fas fa-cog"></i></button>
                        <button class="hover:text-blue-400 transition-colors"><i class="fas fa-compress"></i></button>
                        <button class="hover:text-blue-400 transition-colors"><i class="fas fa-expand"></i></button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Video Details -->
        <div class="mt-4 p-4 bg-slate-800 rounded-xl">
            <h1 class="text-xl font-bold text-white mb-2">Building the Future of Web Development</h1>
            <div class="flex items-center justify-between text-sm text-slate-400 border-b border-slate-700 pb-4 mb-4">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold">T</div>
                    <span>TechTalks</span>
                    <span class="mx-2">•</span>
                    <span>1.2M views</span>
                    <span class="mx-2">•</span>
                    <span>2 days ago</span>
                </div>
                <div class="flex gap-4">
                    <button class="hover:text-white transition-colors flex items-center gap-1"><i class="fas fa-thumbs-up"></i> 45K</button>
                    <button class="hover:text-white transition-colors flex items-center gap-1"><i class="fas fa-thumbs-down"></i> DISLIKE</button>
                    <button class="hover:text-white transition-colors flex items-center gap-1"><i class="fas fa-share"></i> SHARE</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
