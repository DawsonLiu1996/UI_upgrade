<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-step Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 font-sans text-slate-900">
    
    <div class="max-w-3xl w-full bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
        
        <!-- Header & Stepper -->
        <div class="bg-indigo-600 px-6 sm:px-12 py-8 text-white relative overflow-hidden">
            <!-- Decorative background pattern -->
            <div class="absolute -top-24 -right-24 w-64 h-64 rounded-full bg-white opacity-5 mix-blend-overlay"></div>
            <div class="absolute -bottom-24 -left-24 w-64 h-64 rounded-full bg-white opacity-5 mix-blend-overlay"></div>

            <div class="relative z-10">
                <h1 class="text-3xl font-bold mb-2">Create Your Account</h1>
                <p class="text-indigo-100 text-sm">Join us today! It only takes a few minutes.</p>
                
                <!-- Stepper -->
                <div class="mt-8 mb-4">
                    <h2 class="sr-only">Steps</h2>
                    <div class="relative after:absolute after:inset-x-0 after:top-1/2 after:block after:h-0.5 after:-translate-y-1/2 after:rounded-lg after:bg-indigo-400">
                        <ol class="relative z-10 flex justify-between text-sm font-medium">
                            <!-- Step 1: Completed -->
                            <li class="flex items-center gap-2 bg-indigo-600 pr-2">
                                <span class="flex h-8 w-8 items-center justify-center rounded-full bg-white text-indigo-600 font-bold shadow">
                                    <i class="fa-solid fa-check"></i>
                                </span>
                                <span class="hidden sm:block font-bold">Account</span>
                            </li>
                            <!-- Step 2: Active -->
                            <li class="flex items-center gap-2 bg-indigo-600 px-2">
                                <span class="flex h-8 w-8 items-center justify-center rounded-full bg-indigo-200 text-indigo-800 font-bold ring-4 ring-white shadow">
                                    2
                                </span>
                                <span class="hidden sm:block font-bold">Personal Details</span>
                            </li>
                            <!-- Step 3: Upcoming -->
                            <li class="flex items-center gap-2 bg-indigo-600 px-2">
                                <span class="flex h-8 w-8 items-center justify-center rounded-full bg-indigo-500/50 text-white border border-indigo-400">
                                    3
                                </span>
                                <span class="hidden sm:block text-indigo-200">Payment</span>
                            </li>
                            <!-- Step 4: Upcoming -->
                            <li class="flex items-center gap-2 bg-indigo-600 pl-2">
                                <span class="flex h-8 w-8 items-center justify-center rounded-full bg-indigo-500/50 text-white border border-indigo-400">
                                    4
                                </span>
                                <span class="hidden sm:block text-indigo-200">Confirm</span>
                            </li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>

        <!-- Form Content Area -->
        <div class="p-6 sm:p-12">
            
            <form>
                <div class="mb-8">
                    <h3 class="text-xl font-bold text-slate-900 mb-6">Personal Details</h3>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-6">
                        <!-- First Name -->
                        <div>
                            <label for="first-name" class="block text-sm font-medium text-slate-700 mb-2">First Name</label>
                            <input type="text" id="first-name" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors shadow-sm outline-none" placeholder="e.g. Jane">
                        </div>
                        
                        <!-- Last Name -->
                        <div>
                            <label for="last-name" class="block text-sm font-medium text-slate-700 mb-2">Last Name</label>
                            <input type="text" id="last-name" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors shadow-sm outline-none" placeholder="e.g. Doe">
                        </div>
                    </div>

                    <!-- Phone Number -->
                    <div class="mb-6">
                        <label for="phone" class="block text-sm font-medium text-slate-700 mb-2">Phone Number</label>
                        <div class="flex">
                            <span class="inline-flex items-center px-4 rounded-l-lg border border-r-0 border-slate-300 bg-slate-50 text-slate-500 sm:text-sm">
                                US (+1)
                            </span>
                            <input type="tel" id="phone" class="flex-1 min-w-0 block w-full px-4 py-3 rounded-none rounded-r-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors shadow-sm outline-none" placeholder="(555) 123-4567">
                        </div>
                    </div>

                    <!-- Address -->
                    <div class="mb-6">
                        <label for="address" class="block text-sm font-medium text-slate-700 mb-2">Street Address</label>
                        <input type="text" id="address" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors shadow-sm outline-none mb-4" placeholder="123 Main St">
                        <input type="text" id="address-2" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors shadow-sm outline-none" placeholder="Apt, Suite, Unit, etc. (Optional)">
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-6">
                        <!-- City -->
                        <div class="sm:col-span-1">
                            <label for="city" class="block text-sm font-medium text-slate-700 mb-2">City</label>
                            <input type="text" id="city" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors shadow-sm outline-none" placeholder="San Francisco">
                        </div>
                        
                        <!-- State -->
                        <div class="sm:col-span-1">
                            <label for="state" class="block text-sm font-medium text-slate-700 mb-2">State / Province</label>
                            <div class="relative">
                                <select id="state" class="w-full appearance-none px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors shadow-sm outline-none bg-white">
                                    <option value="" disabled selected>Select state...</option>
                                    <option value="CA">California</option>
                                    <option value="NY">New York</option>
                                    <option value="TX">Texas</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                                    <i class="fa-solid fa-chevron-down text-xs"></i>
                                </div>
                            </div>
                        </div>

                        <!-- ZIP -->
                        <div class="sm:col-span-1">
                            <label for="zip" class="block text-sm font-medium text-slate-700 mb-2">ZIP / Postal</label>
                            <input type="text" id="zip" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors shadow-sm outline-none" placeholder="94105">
                        </div>
                    </div>
                </div>

                <!-- Navigation Buttons -->
                <div class="flex items-center justify-between pt-6 border-t border-slate-200 mt-8">
                    <button type="button" class="px-6 py-3 border border-slate-300 text-slate-700 font-medium rounded-lg hover:bg-slate-50 hover:text-slate-900 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 flex items-center gap-2">
                        <i class="fa-solid fa-arrow-left"></i> Back
                    </button>
                    <button type="button" class="px-8 py-3 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 flex items-center gap-2 shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                        Next Step <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
