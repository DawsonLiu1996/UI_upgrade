<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart List</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen py-12 px-4 sm:px-6 lg:px-8 font-sans">
    
    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
        
        <!-- Header -->
        <div class="px-8 py-6 border-b border-gray-200 flex justify-between items-center bg-gray-50/50">
            <h1 class="text-2xl font-bold text-gray-900">Shopping Cart</h1>
            <span class="text-sm font-medium text-gray-500 bg-gray-200 px-3 py-1 rounded-full">3 Items</span>
        </div>

        <!-- Cart Items -->
        <div class="divide-y divide-gray-200">
            
            <!-- Item 1 -->
            <div class="p-8 flex flex-col sm:flex-row items-start sm:items-center gap-6 hover:bg-gray-50 transition-colors">
                <div class="w-24 h-24 shrink-0 bg-gray-100 rounded-lg border border-gray-200 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80" alt="Product" class="w-full h-full object-cover">
                </div>
                
                <div class="flex-1 min-w-0">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="text-lg font-semibold text-gray-900 truncate">Smart Watch Pro</h3>
                            <p class="mt-1 text-sm text-gray-500">Space Gray &middot; 44mm</p>
                        </div>
                        <p class="text-lg font-bold text-gray-900 ml-4">$299.00</p>
                    </div>
                    
                    <div class="mt-4 flex items-center justify-between">
                        <div class="flex items-center border border-gray-300 rounded-lg bg-white">
                            <button class="px-3 py-1 text-gray-600 hover:bg-gray-100 rounded-l-lg transition-colors">-</button>
                            <span class="px-3 py-1 text-sm font-medium text-gray-900 border-x border-gray-300">1</span>
                            <button class="px-3 py-1 text-gray-600 hover:bg-gray-100 rounded-r-lg transition-colors">+</button>
                        </div>
                        <button class="text-sm font-medium text-red-600 hover:text-red-500 transition-colors flex items-center">
                            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            Remove
                        </button>
                    </div>
                </div>
            </div>

            <!-- Item 2 -->
            <div class="p-8 flex flex-col sm:flex-row items-start sm:items-center gap-6 hover:bg-gray-50 transition-colors">
                <div class="w-24 h-24 shrink-0 bg-gray-100 rounded-lg border border-gray-200 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80" alt="Product" class="w-full h-full object-cover">
                </div>
                
                <div class="flex-1 min-w-0">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="text-lg font-semibold text-gray-900 truncate">Wireless Noise-Cancelling Headphones</h3>
                            <p class="mt-1 text-sm text-gray-500">Matte Black</p>
                        </div>
                        <p class="text-lg font-bold text-gray-900 ml-4">$349.00</p>
                    </div>
                    
                    <div class="mt-4 flex items-center justify-between">
                        <div class="flex items-center border border-gray-300 rounded-lg bg-white">
                            <button class="px-3 py-1 text-gray-600 hover:bg-gray-100 rounded-l-lg transition-colors">-</button>
                            <span class="px-3 py-1 text-sm font-medium text-gray-900 border-x border-gray-300">1</span>
                            <button class="px-3 py-1 text-gray-600 hover:bg-gray-100 rounded-r-lg transition-colors">+</button>
                        </div>
                        <button class="text-sm font-medium text-red-600 hover:text-red-500 transition-colors flex items-center">
                            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            Remove
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Item 3 -->
            <div class="p-8 flex flex-col sm:flex-row items-start sm:items-center gap-6 hover:bg-gray-50 transition-colors">
                <div class="w-24 h-24 shrink-0 bg-gray-100 rounded-lg border border-gray-200 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80" alt="Product" class="w-full h-full object-cover">
                </div>
                
                <div class="flex-1 min-w-0">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="text-lg font-semibold text-gray-900 truncate">Running Shoes Series X</h3>
                            <p class="mt-1 text-sm text-gray-500">Crimson Red &middot; Size 10</p>
                        </div>
                        <p class="text-lg font-bold text-gray-900 ml-4">$129.00</p>
                    </div>
                    
                    <div class="mt-4 flex items-center justify-between">
                        <div class="flex items-center border border-gray-300 rounded-lg bg-white">
                            <button class="px-3 py-1 text-gray-600 hover:bg-gray-100 rounded-l-lg transition-colors">-</button>
                            <span class="px-3 py-1 text-sm font-medium text-gray-900 border-x border-gray-300">2</span>
                            <button class="px-3 py-1 text-gray-600 hover:bg-gray-100 rounded-r-lg transition-colors">+</button>
                        </div>
                        <button class="text-sm font-medium text-red-600 hover:text-red-500 transition-colors flex items-center">
                            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            Remove
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Summary Footer -->
        <div class="bg-gray-50 p-8 border-t border-gray-200 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="w-full md:w-1/2 relative">
                <input type="text" placeholder="Promo code" class="w-full pl-4 pr-24 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                <button class="absolute right-2 top-2 bottom-2 bg-gray-900 text-white px-4 rounded-md text-sm font-medium hover:bg-gray-800 transition-colors">Apply</button>
            </div>
            
            <div class="w-full md:w-auto flex flex-col items-end">
                <div class="flex items-center text-gray-500 mb-2 text-sm">
                    <span class="mr-4">Subtotal</span>
                    <span class="font-medium text-gray-900">$777.00</span>
                </div>
                <div class="flex items-center text-gray-500 mb-4 text-sm">
                    <span class="mr-4">Shipping</span>
                    <span class="font-medium text-green-600">Free</span>
                </div>
                <div class="flex items-center text-xl font-bold text-gray-900 mb-6">
                    <span class="mr-4">Total</span>
                    <span>$777.00</span>
                </div>
                <button class="w-full md:w-auto bg-blue-600 text-white px-8 py-3.5 rounded-xl font-semibold hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all active:scale-95">
                    Proceed to Checkout
                </button>
            </div>
        </div>

    </div>

</body>
</html>
