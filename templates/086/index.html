<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    
    <div class="max-w-sm w-full bg-white rounded-3xl shadow-xl overflow-hidden transform transition-all hover:-translate-y-1 hover:shadow-2xl duration-300">
        
        <!-- Cover Image -->
        <div class="h-32 bg-gradient-to-r from-purple-500 to-indigo-600 relative">
            <img src="https://images.unsplash.com/photo-1579546929518-9e396f3cc809?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80" alt="Cover" class="w-full h-full object-cover opacity-60 mix-blend-overlay">
            
            <!-- Action buttons (top right) -->
            <div class="absolute top-4 right-4 flex gap-2">
                <button class="w-8 h-8 rounded-full bg-white/20 backdrop-blur-md text-white flex items-center justify-center hover:bg-white/40 transition-colors">
                    <i class="fas fa-share-alt text-sm"></i>
                </button>
                <button class="w-8 h-8 rounded-full bg-white/20 backdrop-blur-md text-white flex items-center justify-center hover:bg-white/40 transition-colors">
                    <i class="fas fa-ellipsis-v text-sm"></i>
                </button>
            </div>
        </div>

        <!-- Profile Info -->
        <div class="relative px-6 pb-6">
            
            <!-- Avatar (overlap) -->
            <div class="absolute -top-12 left-6">
                <div class="relative">
                    <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?ixlib=rb-1.2.1&auto=format&fit=crop&w=256&q=80" alt="Avatar" class="w-24 h-24 rounded-full border-4 border-white shadow-md object-cover">
                    <div class="absolute bottom-1 right-1 w-4 h-4 bg-green-500 border-2 border-white rounded-full" title="Online"></div>
                </div>
            </div>

            <!-- Follow Button (overlap right) -->
            <div class="flex justify-end pt-4 mb-4">
                <button class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-1.5 px-5 rounded-full shadow-sm transition-colors text-sm">
                    Follow
                </button>
            </div>

            <!-- Text Info -->
            <div class="mt-2">
                <h1 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                    Elena Rodriguez
                    <i class="fas fa-check-circle text-blue-500 text-sm" title="Verified"></i>
                </h1>
                <p class="text-indigo-600 font-medium text-sm">@elena_creates</p>
                <p class="text-slate-500 text-sm mt-1 flex items-center gap-1">
                    <i class="fas fa-map-marker-alt"></i> Barcelona, Spain
                </p>
                
                <p class="text-slate-700 mt-4 leading-relaxed text-sm">
                    Digital artist and UI/UX designer. Passionate about creating intuitive interfaces and colorful illustrations. Coffee addict ☕
                </p>

                <!-- Badges -->
                <div class="flex flex-wrap gap-2 mt-4">
                    <span class="px-2.5 py-1 bg-slate-100 text-slate-600 rounded-md text-xs font-medium border border-slate-200">UI/UX</span>
                    <span class="px-2.5 py-1 bg-slate-100 text-slate-600 rounded-md text-xs font-medium border border-slate-200">Illustration</span>
                    <span class="px-2.5 py-1 bg-slate-100 text-slate-600 rounded-md text-xs font-medium border border-slate-200">Figma</span>
                </div>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-3 gap-4 border-t border-slate-100 mt-6 pt-6 text-center">
                <div>
                    <div class="text-xl font-bold text-slate-800">142</div>
                    <div class="text-xs text-slate-500 font-medium uppercase tracking-wider mt-1">Posts</div>
                </div>
                <div>
                    <div class="text-xl font-bold text-slate-800">12.5k</div>
                    <div class="text-xs text-slate-500 font-medium uppercase tracking-wider mt-1">Followers</div>
                </div>
                <div>
                    <div class="text-xl font-bold text-slate-800">450</div>
                    <div class="text-xs text-slate-500 font-medium uppercase tracking-wider mt-1">Following</div>
                </div>
            </div>

            <!-- Social Links -->
            <div class="flex justify-center gap-4 mt-6">
                <a href="#" class="w-10 h-10 rounded-full bg-slate-50 text-slate-400 hover:bg-blue-50 hover:text-blue-500 flex items-center justify-center transition-colors">
                    <i class="fab fa-twitter text-lg"></i>
                </a>
                <a href="#" class="w-10 h-10 rounded-full bg-slate-50 text-slate-400 hover:bg-pink-50 hover:text-pink-500 flex items-center justify-center transition-colors">
                    <i class="fab fa-dribbble text-lg"></i>
                </a>
                <a href="#" class="w-10 h-10 rounded-full bg-slate-50 text-slate-400 hover:bg-purple-50 hover:text-purple-500 flex items-center justify-center transition-colors">
                    <i class="fab fa-instagram text-lg"></i>
                </a>
                <a href="#" class="w-10 h-10 rounded-full bg-slate-50 text-slate-400 hover:bg-slate-200 hover:text-slate-800 flex items-center justify-center transition-colors">
                    <i class="fas fa-link text-lg"></i>
                </a>
            </div>

        </div>
    </div>

</body>
</html>
