<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player Controls</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-900 min-h-screen flex items-end justify-center pb-12 px-4 font-sans">
    
    <!-- Player Bar -->
    <div class="w-full max-w-4xl bg-stone-800/90 backdrop-blur-xl border border-stone-700/50 rounded-2xl shadow-2xl p-4 flex flex-col sm:flex-row items-center justify-between gap-6 sm:gap-4 relative overflow-hidden">
        
        <!-- Subtle gradient background -->
        <div class="absolute inset-0 bg-gradient-to-r from-emerald-500/10 via-transparent to-transparent pointer-events-none"></div>

        <!-- Song Info -->
        <div class="flex items-center w-full sm:w-1/3 relative z-10">
            <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80" alt="Album Art" class="w-14 h-14 rounded-lg object-cover shadow-md">
            <div class="ml-4 min-w-0">
                <h4 class="text-white text-sm font-bold truncate hover:underline cursor-pointer">Midnight City</h4>
                <p class="text-stone-400 text-xs font-medium truncate hover:underline cursor-pointer mt-0.5">Synthwave Collective</p>
            </div>
            <button class="ml-4 text-emerald-400 hover:text-emerald-300 transition-colors focus:outline-none">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"></path></svg>
            </button>
        </div>

        <!-- Main Controls -->
        <div class="flex flex-col items-center w-full sm:w-1/3 relative z-10">
            <div class="flex items-center space-x-6 mb-2">
                <button class="text-stone-400 hover:text-white transition-colors focus:outline-none">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                </button>
                <button class="text-stone-300 hover:text-white transition-colors focus:outline-none">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 4l12 8-12 8z"></path></svg> <!-- Reverse icon conceptually -->
                </button>
                <button class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-stone-900 hover:scale-105 transition-transform shadow-lg focus:outline-none">
                    <svg class="w-5 h-5 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
                </button>
                <button class="text-stone-300 hover:text-white transition-colors focus:outline-none">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M18 20V4l-12 8z"></path></svg> <!-- Forward icon conceptually -->
                </button>
                <button class="text-emerald-400 hover:text-emerald-300 transition-colors focus:outline-none">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
            </div>
            
            <!-- Progress Bar -->
            <div class="flex items-center w-full space-x-3 text-xs text-stone-400 font-medium tracking-wide">
                <span>2:14</span>
                <div class="flex-1 h-1.5 bg-stone-700 rounded-full cursor-pointer group relative">
                    <div class="absolute h-full bg-emerald-500 rounded-full w-1/3 group-hover:bg-emerald-400 transition-colors"></div>
                    <div class="absolute w-3 h-3 bg-white rounded-full -top-[3px] left-1/3 -ml-1.5 opacity-0 group-hover:opacity-100 transition-opacity shadow"></div>
                </div>
                <span>4:35</span>
            </div>
        </div>

        <!-- Extra Controls -->
        <div class="hidden sm:flex items-center justify-end w-1/3 space-x-4 relative z-10 text-stone-400">
            <button class="hover:text-white transition-colors focus:outline-none">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
            </button>
            <button class="hover:text-white transition-colors focus:outline-none">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            </button>
            <div class="flex items-center space-x-2 w-24 group">
                <button class="hover:text-white transition-colors focus:outline-none">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
                </button>
                <div class="flex-1 h-1.5 bg-stone-700 rounded-full cursor-pointer relative">
                    <div class="absolute h-full bg-stone-300 group-hover:bg-emerald-400 rounded-full w-2/3 transition-colors"></div>
                    <div class="absolute w-3 h-3 bg-white rounded-full -top-[3px] left-2/3 -ml-1.5 opacity-0 group-hover:opacity-100 transition-opacity shadow"></div>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
