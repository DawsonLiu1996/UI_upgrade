<section class="bg-zinc-50">
  <div class="mx-auto max-w-6xl px-6 py-12">
    <div class="flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
      <div>
        <h2 class="text-2xl font-semibold tracking-tight text-zinc-950">Workspace settings</h2>
        <p class="mt-1 text-sm text-zinc-600">A structured form layout with clear hierarchy and helper text.</p>
      </div>
      <button class="rounded-xl bg-zinc-950 px-4 py-2 text-sm font-semibold text-white hover:bg-zinc-900">Save changes</button>
    </div>

    <div class="mt-8 overflow-hidden rounded-2xl border border-zinc-200 bg-white shadow-sm">
      <div class="grid gap-0 lg:grid-cols-12">
        <div class="border-b border-zinc-200 px-6 py-6 lg:col-span-4 lg:border-b-0 lg:border-r">
          <div class="text-sm font-semibold text-zinc-950">Profile</div>
          <div class="mt-2 text-sm leading-6 text-zinc-600">
            Update name and defaults. Keep labels short and helper text specific.
          </div>
        </div>
        <div class="px-6 py-6 lg:col-span-8">
          <div class="grid gap-4 sm:grid-cols-2">
            <label class="block">
              <span class="text-xs font-medium text-zinc-700">Workspace name</span>
              <input
                class="mt-2 w-full rounded-xl border border-zinc-200 bg-white px-4 py-2.5 text-sm text-zinc-900 placeholder:text-zinc-400 focus:border-zinc-400 focus:outline-none focus:ring-4 focus:ring-zinc-100"
                placeholder="Studio UI"
                type="text"
              />
            </label>
            <label class="block">
              <span class="text-xs font-medium text-zinc-700">Default region</span>
              <select
                class="mt-2 w-full rounded-xl border border-zinc-200 bg-white px-4 py-2.5 text-sm text-zinc-900 focus:border-zinc-400 focus:outline-none focus:ring-4 focus:ring-zinc-100"
              >
                <option>US East</option>
                <option>EU West</option>
                <option>APAC</option>
              </select>
            </label>
            <label class="block sm:col-span-2">
              <span class="text-xs font-medium text-zinc-700">Description</span>
              <textarea
                class="mt-2 w-full rounded-xl border border-zinc-200 bg-white px-4 py-2.5 text-sm text-zinc-900 placeholder:text-zinc-400 focus:border-zinc-400 focus:outline-none focus:ring-4 focus:ring-zinc-100"
                placeholder="What is this workspace for?"
                rows="4"
              ></textarea>
            </label>
          </div>
        </div>
      </div>

      <div class="grid gap-0 border-t border-zinc-200 lg:grid-cols-12">
        <div class="border-b border-zinc-200 px-6 py-6 lg:col-span-4 lg:border-b-0 lg:border-r">
          <div class="text-sm font-semibold text-zinc-950">Security</div>
          <div class="mt-2 text-sm leading-6 text-zinc-600">Controls that are easy to scan, with safe defaults.</div>
        </div>
        <div class="px-6 py-6 lg:col-span-8">
          <div class="grid gap-4">
            <label class="flex items-start justify-between gap-6 rounded-2xl border border-zinc-200 bg-zinc-50 p-4">
              <div>
                <div class="text-sm font-semibold text-zinc-950">Require 2FA</div>
                <div class="mt-1 text-sm text-zinc-600">Enforce multi-factor authentication for all members.</div>
              </div>
              <input class="mt-1 h-4 w-4 accent-zinc-950" type="checkbox" checked />
            </label>
            <label class="flex items-start justify-between gap-6 rounded-2xl border border-zinc-200 bg-zinc-50 p-4">
              <div>
                <div class="text-sm font-semibold text-zinc-950">IP allowlist</div>
                <div class="mt-1 text-sm text-zinc-600">Limit access to trusted networks only.</div>
              </div>
              <input class="mt-1 h-4 w-4 accent-zinc-950" type="checkbox" />
            </label>
          </div>

          <div class="mt-6 flex items-center justify-end gap-2">
            <button class="rounded-xl border border-zinc-200 bg-white px-4 py-2 text-sm font-semibold text-zinc-900 hover:bg-zinc-50">
              Cancel
            </button>
            <button class="rounded-xl bg-zinc-950 px-4 py-2 text-sm font-semibold text-white hover:bg-zinc-900">
              Save
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
